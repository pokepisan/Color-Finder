<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Color Finder</title>
    <meta name="description" content="Oil paint color matching tool" />

    <!-- PWA manifest -->
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />

    <!-- Standard favicon -->
    <link rel="icon" href="%sveltekit.assets%/icon-192.png" />

    <!-- iOS PWA — makes it open full-screen from home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Color Finder" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icon-512.png" />

    <!-- Theme color (matches toolbar background) -->
    <meta name="theme-color" content="#13162a" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
